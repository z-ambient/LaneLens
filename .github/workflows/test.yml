name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      # pip itself is upgraded first: pip-audit below scans the whole
      # environment, and a stale bundled pip is a recurring false alarm.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # No RIOT_API_KEY / OPENAI_API_KEY on purpose: the suite is fully
      # hermetic (Riot and OpenAI are mocked, Data Dragon has a bundled
      # fallback), which this run also proves on every push.
      - name: Run tests
        run: python -m pytest -q

      # Fails the build if any pinned dependency (or anything it pulls in)
      # has a known CVE, so we hear about it from CI instead of an incident.
      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit
